name: CI-CD Pipeline (Maven + Tests + Sonar + Docker + Nexus)

on:
  push:
    branches: [ "main" ]

jobs:
  build-test-scan-docker:
    runs-on: self-hosted

    env:
      IMAGE_NAME: myapp

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # 1️⃣ Maven Build + Unit Tests
      - name: Maven Build & Unit Tests
        run: mvn clean test

      # 2️⃣ Integration / Functional Tests
      - name: Integration Tests
        run: mvn verify

      # 3️⃣ Performance Tests
      - name: Performance Tests
        run: bash scripts/perf-test.sh

      # 4️⃣ Sonar Scan
      - name: SonarCloud Scan
        run: |
          mvn sonar:sonar \
            -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }} \
            -Dsonar.login=${{ secrets.SONAR_TOKEN }} \
            -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }} \
            -Dsonar.organization=${{ secrets.SONAR_ORG }}
            -Dsonar.branch.name=main
      # 5️⃣ Docker Build
      - name: Set Image Tag
        run: echo "IMAGE_TAG=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Docker Build
        run: docker build -t myapp:${{ env.IMAGE_TAG }} .

      # 6️⃣ Push Image to Nexus
      - name: Login to Nexus
        run: |
          echo "${{ secrets.NEXUS_PASSWORD }}" | \
          docker login ${{ secrets.NEXUS_DOCKER_REGISTRY }} \
          -u "${{ secrets.NEXUS_USERNAME }}" --password-stdin

      - name: Push to Nexus
        run: |
          docker tag myapp:${{ env.IMAGE_TAG }} \
            ${{ secrets.NEXUS_DOCKER_REGISTRY }}/docker-hosted/myapp:${{ env.IMAGE_TAG }}

          docker push \
            ${{ secrets.NEXUS_DOCKER_REGISTRY }}/docker-hosted/myapp:${{ env.IMAGE_TAG }}

